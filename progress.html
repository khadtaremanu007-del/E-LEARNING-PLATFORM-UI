<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress - E-Learning Platform</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <nav>
            <h2>E-Learning</h2>

            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="progress.html">Progress</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="progress-section">

        <h2>Course Progress</h2>

        <!-- HTML -->

        <div class="progress-card">

            <h3>HTML & CSS</h3>

            <div class="progress-bar">
                <div class="progress html-progress" id="htmlProgress">
                    80%
                </div>
            </div>

            <br>

            <button id="htmlBtn">
                Complete Next Lesson
            </button>

        </div>

        <!-- JavaScript -->

        <div class="progress-card">

            <h3>JavaScript</h3>

            <div class="progress-bar">
                <div class="progress js-progress" id="jsProgress">
                    60%
                </div>
            </div>

            <br>

            <button id="jsBtn">
                Complete Next Lesson
            </button>

        </div>

        <!-- Python -->

        <div class="progress-card">

            <h3>Python Programming</h3>

            <div class="progress-bar">
                <div class="progress python-progress" id="pythonProgress">
                    45%
                </div>
            </div>

            <br>

            <button id="pythonBtn">
                Complete Next Lesson
            </button>

        </div>

    </section>

    <footer>
        <p>© 2026 E-Learning Platform. All Rights Reserved.</p>
    </footer>

    <script src="js/script.js"></script>

</body>

</html>
